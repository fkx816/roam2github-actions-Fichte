name: "Roam Research backup"

on:
  push:
    branches:
      - main
  schedule:
      # Here you can change how often your backup runs. See https://crontab.guru/examples.html
      - cron: "30 13,21 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    name: Backup
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ secrets.BACKUP_REPO }}
          token: ${{ secrets.ACCESS_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node.js modules
        uses: actions/cache@v3.4.3
        with:
          path: ~/.npm
          key: ${{ runner.OS }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-node-
      
      - name: Run Backup
        run: |
          cd /tmp
          git clone -q https://github.com/everruler12/roam2github.git roam2github
          cd $_
          python3 - <<'PY'
          from pathlib import Path
          p = Path('backup.js')
          s = p.read_text()
          s = s.replace("""            log('- (Wait for auto-refresh)')\n            // log('- (Wait 10 seconds for auto-refresh)')\n            // await page.waitForTimeout(10000) // because Roam auto refreshes the sign-in page, as mentioned here https://github.com/MatthieuBizien/roam-to-git/issues/87#issuecomment-763281895 (and can be seen in non-headless browser)\n\n            await page.waitForSelector('.loading-astrolabe', { timeout: 20000 })\n            await page.waitForSelector('.loading-astrolabe', { hidden: true })\n            // log('- auto-refreshed')\n""", """            log('- Login page ready')\n            await page.waitForSelector('input[name=\"password\"]')\n""")
          s = s.replace("""            // log('- Checking for astrolabe spinner')\n            await page.waitForSelector('.loading-astrolabe')\n            log('- astrolabe spinning...')\n\n            //await page.waitForSelector('.loading-astrolabe', { hidden: true })\n            //log('- astrolabe spinning stopped')\n\n            // try {\n            await page.waitForSelector('.roam-app') // add short timeout here, if fails, don't exit code 1, and instead CHECK if have permission to view graph\n""", """            await page.waitForSelector('.roam-app') // add short timeout here, if fails, don't exit code 1, and instead CHECK if have permission to view graph\n""")
          if "loading-astrolabe" in s:
              print('Warning: loading-astrolabe still present')
          p.write_text(s)
          print('Patched backup.js')
          PY
          npm i
          npm run backup -s
        env:
          ROAM_EMAIL: ${{ secrets.ROAM_EMAIL }}
          ROAM_PASSWORD: ${{ secrets.ROAM_PASSWORD }}
          ROAM_GRAPH: ${{ secrets.ROAM_GRAPH }}
          BACKUP_EDN: false
          BACKUP_JSON: false
          BACKUP_MARKDOWN: true
          BACKUP_FLAT_MARKDOWN: false
          BACKUP_MSGPACK: false
    
      - name: Commit Changes
        uses: everruler12/git-auto-commit-action@latest
        with:
          commit_message: Automatic backup